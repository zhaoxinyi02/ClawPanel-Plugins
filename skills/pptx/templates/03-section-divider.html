<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Section-Divider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    /* 序号 + 标题 + 副标题：Figma 自动布局 column gap 16px */
    .header-block {
      position: absolute;
      left: 80px;
      top: 80px;
      width: 953px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header-block [data-slot="chapterNumber"] {
      font-weight: 600;
      font-size: 80px;
      line-height: 1.22;
      color: #73CD94;
    }
    .header-block [data-slot="title"] {
      font-weight: 600;
      font-size: 80px;
      line-height: 1.22;
      color: #000000;
    }
    .header-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.22;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #666666; /* black @ 60% on white */
    }
    .statement-block {
      position: absolute;
      left: 80px;
      top: 882px;
      width: 743px;
    }
    .statement-block [data-slot="statement"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.22;
      color: #000000;
    }
    .deco-image {
      position: absolute;
      left: 1135px;
      top: 28px;
      width: 757px;
      height: 1024px;
      border-radius: 16px;
      overflow: hidden;
    }
    .deco-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="slide" data-template="section-divider">
    <div class="header-block">
      <span data-slot="chapterNumber">01</span>
      <h1 data-slot="title">I am the title of Chapter 1<br>Please try to split into two lines</h1>
      <p data-slot="subtitle">If the title is English, I am the subtitle; if the title is Chinese, I am the English translation</p>
    </div>
    <div class="statement-block">
      <p data-slot="statement">I am a statement or slogan to make the layout more attractive. It's best to be one and a half lines</p>
    </div>
    <div class="deco-image">
      <img data-slot="image" src="https://img.alicdn.com/imgextra/i2/O1CN01VUCyLs1neizxlx7AB_!!6000000005115-2-tps-757-1024.png" alt="">
    </div>
  </div>
</body>
</html>
