<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Contents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 10px;
      height: 1080px;
      background-color: #73CD94;
    }
    .title-block {
      position: absolute;
      left: 140px;
      top: 120px;
      width: 281px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.22;
      color: #000000;
    }
    .intro-block {
      position: absolute;
      left: 140px;
      top: 214px;
      width: 1640px;
    }
    .intro-block [data-slot="intro"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #000000;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #666666; /* black @ 60% on white */
    }
    .chapter-list {
      position: absolute;
      left: 140px;
      top: 406px;
      width: 468px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }
    .chapter-list [data-slot^="chapter"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.22;
      color: #000000;
    }
  </style>
</head>
<body>
  <div class="slide" data-template="contents">
    <div class="accent-bar"></div>
    <div class="title-block">
      <h1 data-slot="title">Contents</h1>
    </div>
    <div class="intro-block">
      <p data-slot="intro">I am an introduction around the contents</p>
    </div>
    <div class="chapter-list">
      <p data-slot="chapter1">01 I am the chapter name</p>
      <p data-slot="chapter2">02 I am the chapter name</p>
      <p data-slot="chapter3">03 I am the chapter name</p>
      <p data-slot="chapter4">04 I am the chapter name</p>
      <p data-slot="chapter5">05 I am the chapter name</p>
    </div>
  </div>
</body>
</html>
